name: CME Delivery Notices Bot

on:
  schedule:
    - cron: '0 3 * * *' # 每天 UTC 时间凌晨 3:00 运行，你可自行调整
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 notion-client

      - name: Run Python Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit and Push downloaded file
        run: |
          mkdir -p downloads
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add downloads/
          git commit -m "Auto-download CME Delivery Notice" || echo "No changes to commit"
          git push
