name: CME Delivery Notices Bot

on:
  schedule:
    - cron: '0 3 * * *' # 每天 UTC 时间凌晨 3:00 运行，你可自行调整
  workflow_dispatch:    # 允许你在 GitHub 网页上手动点击运行

permissions:
  contents: write       # 赋予 GitHub Actions 推送代码的权限

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 notion-client

      # 1. 运行你的 Python 脚本（抓取数据、下载文件、写入 Notion）
      - name: Run Python Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        # 注意：确认你的 Python 文件名是不是 main.py，如果不是请改过来
        run: python main.py 

      # 2. 将下载到 downloads 文件夹的 PDF 提交并推送到你的 GitHub 仓库
      - name: Commit and push downloaded file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-download latest CME report"
          file_pattern: "downloads/*"
